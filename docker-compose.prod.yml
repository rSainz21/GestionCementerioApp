services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    working_dir: /var/www/html
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stack
      # Ajusta esto en tu .env real (recomendado). Aquí lo dejamos por compatibilidad.
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-cementerio}
      DB_USERNAME: ${DB_USERNAME:-cementerio}
      DB_PASSWORD: ${DB_PASSWORD:-cementerio}
    volumes:
      # Persistencia de ficheros (fotos) y logs
      - app_storage:/var/www/html/storage
      # Cache de framework (a veces necesario para config/routes/views cache)
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      # Public compartido con nginx (assets Vite build + storage link)
      - app_public:/var/www/html/public
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      # Necesario para que el symlink public/storage (-> ../storage/app/public) resuelva en nginx
      - app_storage:/var/www/html/storage:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cementerio}
      MYSQL_USER: ${DB_USERNAME:-cementerio}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cementerio}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    # Si quieres acceder desde fuera (para backups/administración), descomenta:
    # ports:
    #   - "3307:3306"

  phpmyadmin:
    profiles: ["admin"]
    image: phpmyadmin:5
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    depends_on:
      - mysql

volumes:
  mysql_data:
  app_storage:
  app_bootstrap_cache:
  app_public:
