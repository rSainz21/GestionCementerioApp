version: "3.9"

# Stack para Portainer — Cementerio Somahoz
# Aislado de Conecta: red, puertos y volúmenes propios.
#
# Puertos usados:
#   Web   → http://<IP>:8182
#   SSH   → puerto 2224  (para desplegar el código dentro del volumen)
#   HTTPS → puerto 8444
#   DB    → 3318 (solo para acceso externo/admin; Laravel usa 3306 interno)
#
# Diferencias respecto a Conecta:
#   DB port: 3317 → 3318 | Web: 8181 → 8182 | SSH: 2223 → 2224
#   Volúmenes: conecta_* → cementerio_* | Red: conecta_net → cementerio_net

services:

  cementerio_db:
    image: mysql:8.0
    container_name: cementerio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_cementerio
      MYSQL_DATABASE: cementerio
      MYSQL_USER: cementerio_user
      MYSQL_PASSWORD: cementerio_pass
    ports:
      - "3318:3306"
    volumes:
      - cementerio_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - cementerio_net

  cementerio_php:
    image: php82-ssh-conecta:1.3
    container_name: cementerio_php
    restart: unless-stopped
    ports:
      - "8182:80"
      - "2224:22"
      - "8444:443"
    volumes:
      - cementerio_app:/var/www/html
    depends_on:
      - cementerio_db
    networks:
      - cementerio_net

networks:
  cementerio_net:
    driver: bridge

volumes:
  cementerio_mysql_data:
  cementerio_app:
