server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    index index.php index.html;

    # Proxy para la API que expone MySQL por HTTP (para app móvil).
    # Usa resolver + variable para evitar fallo de arranque si mysql-api no está activo en dev.
    location ^~ /mysql-api/ {
        resolver 127.0.0.11 valid=5s;
        set $mysql_api_backend "http://mysql-api:8787";
        proxy_pass $mysql_api_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}
